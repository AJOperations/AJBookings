<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookings</title>
    <link rel="icon" type="image/png" href="https://aj-hq.up.railway.app/static/AJ_FavIcon.png">
    <link rel="stylesheet" href="https://aj-hq.up.railway.app/static/aj-theme.css?v=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
    <link rel="stylesheet" href="/static/main.css?v=2">
    <script src="https://aj-hq.up.railway.app/static/aj-utils.js"></script>
</head>
<body>
    <header class="aj-header" id="aj-header">
        <div class="aj-header-left">
            <div class="aj-hq-trigger" onclick="ajToggleAppMenu()" aria-label="Open app menu">
                <img class="aj-bug" src="" alt="August Jackson">
                <span class="aj-hq-label">HQ</span>
                <i class="ti ti-chevron-down aj-hq-chevron" aria-hidden="true"></i>
            </div>
            <span class="aj-tool-name">Bookings</span>
        </div>
        <div class="aj-header-right">
            <div id="aj-user-zone"></div>
            <div class="aj-header-divider"></div>
            <button class="aj-theme-toggle" aria-label="Toggle theme">
                <i class="ti ti-moon aj-icon-moon" aria-hidden="true"></i>
                <i class="ti ti-sun aj-icon-sun" aria-hidden="true"></i>
            </button>
        </div>
    </header>
    <div class="aj-app-menu" id="aj-app-menu" hidden></div>
    <div id="toast-container"></div>

    <main class="container bk-page">
        <div class="bk-page-header">
            <h1>Events</h1>
            <button class="aj-btn aj-btn-primary" id="new-event-btn"><i class="ti ti-plus"></i> New Event</button>
        </div>

        <div class="aj-card bk-card bk-hidden" id="new-event-card">
            <h2>New Event</h2>
            <div class="bk-form-grid">
                <div class="bk-form-row">
                    <label for="f-name">Name</label>
                    <input type="text" id="f-name" placeholder="e.g. AbbVie Tasting Series">
                </div>
                <div class="bk-form-row" style="position:relative;">
                    <label for="f-job">Job Number</label>
                    <input type="text" id="f-job" placeholder="Search by job number, client, or job name" autocomplete="off">
                    <div id="f-job-suggestions" class="bk-suggestions bk-hidden"></div>
                </div>
                <div class="bk-form-row">
                    <label for="f-location">Location</label>
                    <input type="text" id="f-location" placeholder="optional">
                </div>
                <div class="bk-form-row">
                    <label for="f-max-bookings">Max Bookings / Email</label>
                    <input type="number" id="f-max-bookings" min="1" placeholder="optional">
                </div>
                <div class="bk-form-row">
                    <label for="f-timezone">Time Zone</label>
                    <select id="f-timezone">
                        <option value="America/New_York">Eastern (ET)</option>
                        <option value="America/Chicago" selected>Central (CT)</option>
                        <option value="America/Denver">Mountain (MT)</option>
                        <option value="America/Phoenix">Arizona — no DST (MST)</option>
                        <option value="America/Los_Angeles">Pacific (PT)</option>
                        <option value="America/Anchorage">Alaska (AKT)</option>
                        <option value="Pacific/Honolulu">Hawaii — no DST (HST)</option>
                    </select>
                </div>
            </div>
            <div class="bk-form-row">
                <label for="f-notes">Notes</label>
                <textarea id="f-notes" rows="2"></textarea>
            </div>
            <div class="bk-form-row-inline">
                <input type="checkbox" id="f-waitlist"> <label for="f-waitlist" style="margin:0">Allow waitlist</label>
                <span style="width:16px"></span>
                <input type="checkbox" id="f-reschedule"> <label for="f-reschedule" style="margin:0">Allow reschedule</label>
            </div>
            <div style="display:flex; gap:10px; margin-top:8px;">
                <button class="aj-btn aj-btn-primary" id="create-event-btn">Create Event</button>
                <button class="aj-btn aj-btn-ghost" id="cancel-new-event-btn">Cancel</button>
            </div>
        </div>

        <div class="aj-card bk-card">
            <div class="bk-table-scroll">
                <table class="bk-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Job #</th>
                            <th>Status</th>
                            <th>Slots</th>
                            <th>Bookings</th>
                            <th>Owner</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="events-tbody"></tbody>
                </table>
            </div>
            <div class="bk-empty-state bk-hidden" id="events-empty">No events yet — create your first one above.</div>
        </div>
    </main>

    <script>
        // ── Tap-twice inline confirm ────────────────────────────────────────
        // window.confirm() is banned per standards (bad on mobile, blocked in
        // some HTTPS contexts). First click arms the button and shows a
        // confirm label; a second click within the window fires the action.
        // Auto-resets after 3.5s if there's no second click.
        function armDelete(btn, confirmLabel, action) {
            if (btn.dataset.armed === 'true') {
                clearTimeout(btn._armTimer);
                btn.dataset.armed = 'false';
                btn.textContent = btn.dataset.origLabel;
                action();
                return;
            }
            btn.dataset.origLabel = btn.dataset.origLabel || btn.textContent;
            btn.dataset.armed = 'true';
            btn.textContent = confirmLabel;
            btn._armTimer = setTimeout(() => {
                btn.dataset.armed = 'false';
                btn.textContent = btn.dataset.origLabel;
            }, 3500);
        }

        document.addEventListener('DOMContentLoaded', () => {
            ajInitHeader({ toolName: 'Bookings' });
            loadEvents();
            wireJobAutocomplete('f-job', 'f-job-suggestions');

            document.getElementById('new-event-btn').addEventListener('click', () => {
                document.getElementById('new-event-card').classList.remove('bk-hidden');
            });
            document.getElementById('cancel-new-event-btn').addEventListener('click', () => {
                document.getElementById('new-event-card').classList.add('bk-hidden');
            });
            document.getElementById('create-event-btn').addEventListener('click', createEvent);
        });

        let _jobsListCache = null;
        async function ensureJobsLoaded() {
            if (_jobsListCache) return _jobsListCache;
            _jobsListCache = await getJobs();
            return _jobsListCache;
        }

        function wireJobAutocomplete(inputId, dropdownId) {
            const input = document.getElementById(inputId);
            const dropdown = document.getElementById(dropdownId);

            input.addEventListener('input', async () => {
                const q = input.value.trim().toLowerCase();
                if (!q) { dropdown.classList.add('bk-hidden'); dropdown.innerHTML = ''; return; }

                const jobs = await ensureJobsLoaded();
                const currentYear = new Date().getFullYear();
                const matches = jobs.filter(j => {
                    // Only this year's jobs — jobs with no end_date on record are
                    // kept rather than hidden, since excluding undated-but-active
                    // work would defeat the point of the lookup.
                    const inYear = !j.end_date || new Date(j.end_date).getFullYear() === currentYear;
                    if (!inYear) return false;
                    return String(j.job_number).includes(q) ||
                        (j.client_name || '').toLowerCase().includes(q) ||
                        (j.job_name || '').toLowerCase().includes(q);
                }).slice(0, 8);

                if (matches.length === 0) { dropdown.classList.add('bk-hidden'); dropdown.innerHTML = ''; return; }

                dropdown.innerHTML = matches.map(j => `
                    <div class="bk-suggestion-item" data-job="${j.job_number}">
                        <div>${esc(j.job_number)} — ${esc(j.client_name || '')}</div>
                        <div class="bk-suggestion-meta">${esc(j.job_name || '')}</div>
                    </div>
                `).join('');
                dropdown.classList.remove('bk-hidden');

                dropdown.querySelectorAll('.bk-suggestion-item').forEach(item => {
                    item.addEventListener('click', () => {
                        input.value = item.dataset.job;
                        dropdown.classList.add('bk-hidden');
                        dropdown.innerHTML = '';
                    });
                });
            });

            document.addEventListener('click', (e) => {
                if (!input.contains(e.target) && !dropdown.contains(e.target)) {
                    dropdown.classList.add('bk-hidden');
                }
            });
        }

        function statusPill(status) {
            const pillClass = status === 'active' ? 'aj-pill-success' : 'aj-pill-muted';
            return `<span class="aj-pill ${pillClass}">${status}</span>`;
        }

        async function loadEvents() {
            const res = await fetch('/api/events');
            const data = await res.json();
            const tbody = document.getElementById('events-tbody');
            const empty = document.getElementById('events-empty');
            tbody.innerHTML = '';

            if (!data.events || data.events.length === 0) {
                empty.classList.remove('bk-hidden');
                return;
            }
            empty.classList.add('bk-hidden');

            data.events.forEach(ev => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><a href="/admin/events/${ev.id}" style="color:inherit; text-decoration:none; font-weight:600;">${esc(ev.name)}</a></td>
                    <td>${esc(ev.job_number)}</td>
                    <td>${statusPill(ev.status)}</td>
                    <td>${ev.slot_count}</td>
                    <td>${ev.booking_count}</td>
                    <td>${esc(ev.owner_name || '—')}</td>
                    <td style="text-align:right;">
                        <button class="aj-btn aj-btn-danger aj-btn-sm" data-id="${ev.id}" data-name="${esc(ev.name)}" onclick="deleteEvent(${ev.id}, this)">Delete</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function createEvent() {
            const name = document.getElementById('f-name').value.trim();
            const job_number = document.getElementById('f-job').value.trim();
            const location = document.getElementById('f-location').value.trim();
            const notes = document.getElementById('f-notes').value.trim();
            const allow_waitlist = document.getElementById('f-waitlist').checked;
            const allow_reschedule = document.getElementById('f-reschedule').checked;
            const max_bookings_per_email = document.getElementById('f-max-bookings').value || null;
            const timezone = document.getElementById('f-timezone').value;

            if (!name) { showToast('Name is required', 'error'); return; }
            if (!isValidJobNumber(job_number)) { showToast('Job number must be exactly 7 digits', 'error'); return; }

            const res = await fetch('/api/events', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, job_number, location, notes, allow_waitlist, allow_reschedule, max_bookings_per_email, timezone })
            });
            const data = await res.json();

            if (!res.ok) {
                showToast(data.error || 'Could not create event', 'error');
                return;
            }

            document.getElementById('new-event-card').classList.add('bk-hidden');
            ['f-name','f-job','f-location','f-notes','f-max-bookings'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('f-waitlist').checked = false;
            document.getElementById('f-reschedule').checked = false;

            showToast('Event created', 'success');
            loadEvents();
        }

        async function deleteEvent(id, btn) {
            armDelete(btn, 'Confirm delete?', async () => {
                const res = await fetch(`/api/events/${id}`, { method: 'DELETE' });
                const data = await res.json();
                if (!res.ok) {
                    showToast(data.error || 'Could not delete event', 'error');
                    return;
                }
                loadEvents();
            });
        }
    </script>
</body>
</html>
